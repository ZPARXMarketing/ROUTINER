<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Routine Planner — ZPARX</title>
  <meta name="description" content="Plan, schedule, and fire Claude prompts on a routine. A Notion-to-Claude style command center by ZPARX." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- ZPARX brand fonts (Google Fonts CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app">
    <!-- ── Sidebar: brand + navigation table ── -->
    <aside class="sidebar" id="sidebar" style="display:none">
      <div class="brand">
        <img class="brand__logo" src="assets/zparx-lockup.svg" alt="ZPARX" />
        <span class="brand__wordmark">Routiner</span>
      </div>

      <div class="sidebar__group">
        <span class="sidebar__label">Navigation</span>
        <nav class="tabs" id="tabs">
          <button class="tab is-active" data-view="calendar"><span class="tab__ico">▦</span> Calendar</button>
          <button class="tab" data-view="board"><span class="tab__ico">✎</span> Board <span class="tab__count" data-count="board">0</span></button>
          <button class="tab" data-view="scheduled"><span class="tab__ico">◷</span> Scheduled <span class="tab__count" data-count="scheduled">0</span></button>
          <button class="tab" data-view="library"><span class="tab__ico">▤</span> Library <span class="tab__count" data-count="library">0</span></button>
          <button class="tab" data-view="archived"><span class="tab__ico">▢</span> Archived <span class="tab__count" data-count="archived">0</span></button>
          <button class="tab" data-view="history"><span class="tab__ico">↻</span> History <span class="tab__count" data-count="history">0</span></button>
        </nav>
      </div>

      <div class="sidebar__group sidebar__group--foot">
        <span class="sidebar__label">Account</span>
        <span class="clock clock--block" id="userChip" title="Signed in"></span>
        <button class="btn btn--ghost btn--sm sidebar__btn" id="settingsBtn" title="Trigger &amp; model">⚙ Settings</button>
        <a class="btn btn--ghost btn--sm sidebar__btn" href="usage.html" title="OpenRouter credit &amp; spend meter">◆ Usage</a>
        <button class="btn btn--ghost btn--sm sidebar__btn" id="signOutBtn">Sign out</button>
      </div>
    </aside>

    <!-- ── Main column ── -->
    <div class="content">
      <header class="topbar" id="topbar" style="display:none">
        <div class="topbar__spacer"></div>
        <div class="topbar__actions">
          <span class="clock" id="clock">—</span>
          <button class="btn btn--primary" id="newBtn"><span class="btn__icon">＋</span> New routine</button>
          <label class="fire-toggle" id="fireSwitch" title="Master control: whether this site is allowed to fire routines">
            <span class="fire-toggle__label" id="fireLabel">Inactive</span>
            <span class="fire-toggle__track"><span class="fire-toggle__knob"></span></span>
          </label>
        </div>
      </header>

      <main id="view"></main>
    </div>
  </div>

  <!-- ── Drawer (new / edit routine) ── -->
  <div class="overlay" id="overlay">
    <aside class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
      <div class="drawer__head">
        <h2 id="drawerTitle">New routine</h2>
        <button class="drawer__close" id="drawerClose" aria-label="Close">×</button>
      </div>
      <div class="drawer__body" id="drawerBody"><!-- injected --></div>
      <div class="drawer__foot" id="drawerFoot"><!-- injected --></div>
    </aside>
  </div>

  <div class="toasts" id="toasts"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
